name: CI

on:
  push:
    branches: master
  pull_request:
    branches: "*"

jobs:
  tests:
    name: "ruby ${{ matrix.ruby }} / rails ${{ matrix.rails }} / postgres ${{ matrix.postgres }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "4.0"]
        rails: ["7.2", "8.1"]
        postgres: ["14", "18"]
        include:
          - ruby: "4.0"
            rails: "main"
            postgres: "18"
            allow-failure: true

    continue-on-error: ${{ matrix.allow-failure || false }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      RAILS_VERSION: ${{ matrix.rails }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          rubygems: latest

      - name: Setup environment
        run: bin/setup

      - name: Run unit tests
        env:
          COVERAGE: true
          SIMPLECOV_COMMAND_NAME: unit
        run: bundle exec rspec --exclude-pattern "spec/acceptance/**/*"

      - name: Run acceptance tests
        env:
          COVERAGE: true
          SIMPLECOV_COMMAND_NAME: acceptance
        run: bundle exec rspec spec/acceptance

      - name: Run linter
        run: bundle exec standardrb

  ci:
    name: CI
    needs: [tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          [[ "${{ needs.tests.result }}" == "success" ]] || exit 1
